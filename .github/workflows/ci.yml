name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential qt6-base-dev qt6-tools-dev-tools

      - name: Build
        run: |
          mkdir -p build
          cd build && cmake .. -DCMAKE_BUILD_TYPE=Release && cmake --build . -j$(nproc)

  test-reconner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install reconner
        run: |
          cd reconner
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          cd reconner
          pytest tests/ -q
