name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential qt6-base-dev qt6-tools-dev-tools

      - name: Configure and build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
          cmake --build build -j$(nproc)

      - name: Run C++ unit tests (GoogleTest)
        run: |
          cd build
          ctest --output-on-failure -R zap-desk-unit-tests

  test-reconner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install reconner
        run: |
          cd reconner
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          cd reconner
          pytest tests/ -q --cov=reconner --cov-report=term-missing

  validate-phase2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential qt6-base-dev qt6-tools-dev-tools
          cd reconner && pip install -e ".[dev]"

      - name: Run Phase 2 validation
        run: |
          chmod +x scripts/validate-phase2.sh
          ./scripts/validate-phase2.sh

  validate-phase7:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Phase 7 packaging validation
        run: ./scripts/validate-phase7.sh
